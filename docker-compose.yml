services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-x9core}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-x9core}
      POSTGRES_DB: ${POSTGRES_DB:-x9core}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-x9core} -d ${POSTGRES_DB:-x9core}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: runtime
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-x9core}:${POSTGRES_PASSWORD:-x9core}@postgres:5432/${POSTGRES_DB:-x9core}
      REDIS_URL: redis://${REDIS_HOST:-redis}:6379/0
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: runtime
    command: ["python", "-c", "print('worker placeholder — Taskiq será configurado no Step 7')"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-x9core}:${POSTGRES_PASSWORD:-x9core}@postgres:5432/${POSTGRES_DB:-x9core}
      REDIS_URL: redis://${REDIS_HOST:-redis}:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - worker

  test:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: test
    env_file:
      - .env
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-x9core}:${POSTGRES_PASSWORD:-x9core}@postgres:5432/${POSTGRES_DB:-x9core}
      REDIS_URL: redis://${REDIS_HOST:-redis}:6379/0
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  redis_data:
